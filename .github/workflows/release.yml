name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build mod JAR
        run: ./gradlew build

      - name: Find release JAR
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v '\-dev\.' | grep -v '\-sources\.' | head -1)
          echo "JAR=${JAR}" >> "$GITHUB_OUTPUT"
          echo "Found: ${JAR}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mandatory v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Changelog
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            **Minecraft**: 1.21.11 · **Fabric Loader**: 0.19.3 · **Fabric API**: 0.141.4+1.21.11
          files: ${{ steps.jar.outputs.JAR }}
