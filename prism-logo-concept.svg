<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6" stop-opacity="0"/>
      <stop offset="100%" style="stop-color:#F472B6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8" stop-opacity="0"/>
      <stop offset="100%" style="stop-color:#38BDF8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA" stop-opacity="0"/>
      <stop offset="100%" style="stop-color:#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="prismFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA" stop-opacity="0.25"/>
      <stop offset="100%" style="stop-color:#818CF8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg2)" rx="40"/>

  <!-- Light rays exiting prism (right side) -->
  <polygon points="248,195 340,140 370,140 248,200" fill="url(#ray1)" opacity="0.7"/>
  <polygon points="248,200 350,200 350,205 248,202" fill="url(#ray2)" opacity="0.8"/>
  <polygon points="248,205 340,260 370,265 248,200" fill="url(#ray3)" opacity="0.6"/>

  <!-- Prism (triangle) -->
  <polygon points="200,80 310,280 90,280"
           fill="url(#prismFace)"
           stroke="#60A5FA"
           stroke-width="2.5"
           filter="url(#glow2)"/>

  <!-- Inner prism face detail -->
  <polygon points="200,115 285,270 115,270"
           fill="none"
           stroke="#818CF8"
           stroke-width="1"
           opacity="0.3"/>

  <!-- Light beam entering (left side, horizontal) -->
  <line x1="50" y1="200" x2="155" y2="200"
        stroke="#E2E8F0"
        stroke-width="3"
        opacity="0.6"
        filter="url(#glow2)"/>
  <!-- Arrow tip -->
  <polygon points="155,194 170,200 155,206" fill="#E2E8F0" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="200" y="350"
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="600"
        fill="white"
        text-anchor="middle"
        letter-spacing="10"
        opacity="0.5">PRISM</text>
</svg>
